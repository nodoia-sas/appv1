<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <pattern id="circuit" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
       <path d="M10 0 v20 M0 10 h20" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3"/>
       <circle cx="10" cy="10" r="2" fill="#ffffff" fill-opacity="0.3"/>
    </pattern>
    <linearGradient id="blueMetric" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Blue Ring -->
  <circle cx="256" cy="220" r="150" fill="white" stroke="url(#blueMetric)" stroke-width="16" />

  <!-- T Shape (Background) -->
  <g transform="translate(256, 220)">
     <!-- Top Bar -->
     <rect x="-100" y="-100" width="200" height="50" rx="8" fill="url(#blueMetric)" />
     <!-- Vertical Stem -->
     <rect x="-25" y="-60" width="50" height="180" rx="8" fill="url(#blueMetric)" />
     
     <!-- Tech Pattern Overlay on T -->
     <path d="M-90 -90 h50 v20 h-20 v10" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
     <circle cx="-90" cy="-90" r="3" fill="white" opacity="0.4"/>
     <path d="M80 -90 h-40 v30" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
     <circle cx="80" cy="-90" r="3" fill="white" opacity="0.4"/>
     <path d="M0 -30 v130" stroke="white" stroke-width="2" stroke-dasharray="5,5" opacity="0.3"/>
  </g>

  <!-- Location Pin -->
  <g transform="translate(256, 230)" filter="url(#shadow)">
    <path d="M0,0 m-40,0 a40,40 0 1,0 80,0 a40,40 0 0,0 -80,0" fill="#1e40af" stroke="white" stroke-width="4"/>
    <path d="M-36,4 a36,36 0 0,0 72,0 c0,20 -36,65 -36,65 s-36,-45 -36,-65 z" fill="#1e40af" stroke="white" stroke-width="3"/>
    
    <!-- Car Icon inside Pin -->
    <g transform="translate(-15, -12) scale(1.2)">
      <path fill="white" d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
    </g>
  </g>

  <!-- Text: Transit IA -->
  <text x="256" y="450" 
        font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-weight="900" 
        font-size="60" 
        text-anchor="middle" 
        fill="#1e3a8a">
    Transit IA
  </text>
  
  <!-- Subtle tech lines on 'IA' -->
  <line x1="390" y1="460" x2="450" y2="460" stroke="#1e3a8a" stroke-width="2" stroke-opacity="0.3" />
</svg>
